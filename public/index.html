<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PSN Viewer</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px;
      background: #f5f5f5;
    }
    .card {
      background: #fff;
      border: 1px solid #ddd;
      padding: 16px;
      margin-bottom: 16px;
    }
    .topbar input {
      width: 720px;
      max-width: 100%;
      padding: 10px;
    }
    .topbar button {
      padding: 10px 16px;
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }
    @media (max-width: 900px) {
      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="card topbar">
    <h1>PSN Viewer</h1>
    <input id="npsso" placeholder="Вставь NPSSO" />
    <button id="load">Load</button>
    <button id="logoutAll" style="margin-left: 10px; background-color: #dc3545; color: white;">Выйти на всех устройствах</button>
  </div>

  <div id="content"></div>

  <script src="app.js?v=4"></script>
</body>
</html>
